<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Walkers — Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f7f6f4; --ink: #121212; --mid: #55524c;
            --muted: #8c8881; --faint: #e8e6e1; --accent: #c5a880;
            --white: #fff; --red: #e74c3c; --green: #27ae60;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 14px; }

        /* ── 로그인 ── */
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 24px; }
        #login-screen h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
        .login-box { background: var(--white); border: 1px solid var(--faint); padding: 40px; width: 320px; }
        .login-box input { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid var(--ink); background: transparent; font-size: 15px; outline: none; margin-bottom: 24px; font-family: inherit; }
        .login-box button { width: 100%; background: var(--ink); color: var(--white); border: none; padding: 14px; font-weight: 700; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: inherit; }
        .login-error { color: var(--red); font-size: 12px; margin-top: 12px; display: none; }

        /* ── 레이아웃 ── */
        #admin-screen { display: none; }
        .admin-header { background: var(--ink); color: var(--white); padding: 0 32px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .admin-header h1 { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
        .admin-header button { background: none; border: 1px solid rgba(255,255,255,0.3); color: var(--white); padding: 6px 14px; font-size: 11px; letter-spacing: 0.08em; cursor: pointer; font-family: inherit; }
        .admin-body { display: flex; min-height: calc(100vh - 52px); }

        /* 사이드 탭 */
        .admin-tabs { width: 180px; background: var(--white); border-right: 1px solid var(--faint); padding: 20px 0; flex-shrink: 0; position: sticky; top: 52px; height: calc(100vh - 52px); overflow-y: auto; }
        .tab-group-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 16px 20px 8px; }
        .tab-btn { display: block; width: 100%; padding: 11px 20px; background: none; border: none; border-left: 2px solid transparent; text-align: left; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .tab-btn:hover { color: var(--ink); background: var(--bg); }
        .tab-btn.active { color: var(--ink); border-left-color: var(--ink); background: var(--bg); }

        /* 컨텐츠 */
        .admin-content { flex: 1; padding: 36px 40px; max-width: 860px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; border-bottom: 1px solid var(--faint); padding-bottom: 20px; }
        .panel-header h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }

        /* 버튼 */
        .btn { padding: 9px 18px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: none; font-family: inherit; transition: all 0.15s; }
        .btn-primary { background: var(--ink); color: var(--white); }
        .btn-primary:hover { background: #333; }
        .btn-danger  { background: none; color: var(--red); border: 1px solid var(--red); }
        .btn-ghost   { background: none; color: var(--mid); border: 1px solid var(--faint); }
        .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }
        .btn-sm { padding: 6px 12px; font-size: 10px; }

        /* 폼 */
        .form-card { background: var(--white); border: 1px solid var(--faint); padding: 28px; margin-bottom: 20px; }
        .form-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 20px; }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 7px; }
        .field input, .field textarea, .field select { width: 100%; padding: 9px 12px; border: 1px solid var(--faint); background: var(--bg); font-size: 13px; font-family: inherit; color: var(--ink); outline: none; transition: border-color 0.15s; }
        .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--ink); background: var(--white); }
        .field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; align-items: center; }
        .inline-msg { font-size: 12px; padding: 7px 12px; display: none; }
        .inline-msg.ok  { background: #edf7ed; color: var(--green); display: inline-block; }
        .inline-msg.err { background: #fdecea; color: var(--red);   display: inline-block; }

        /* 토글 */
        .toggle-wrap { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .toggle { width: 38px; height: 20px; background: var(--faint); border-radius: 99px; cursor: pointer; position: relative; transition: background 0.2s; border: none; flex-shrink: 0; }
        .toggle::after { content: ''; position: absolute; left: 3px; top: 2px; width: 16px; height: 16px; background: var(--white); border-radius: 50%; transition: left 0.2s; }
        .toggle.on { background: var(--ink); }
        .toggle.on::after { left: 19px; }
        .toggle-label { font-size: 12px; color: var(--muted); }

        /* 목록 */
        .list-item { background: var(--white); border: 1px solid var(--faint); border-bottom: none; padding: 16px 20px; display: flex; align-items: center; gap: 14px; transition: background 0.15s; }
        .list-item:last-child { border-bottom: 1px solid var(--faint); }
        .list-item:hover { background: #fafaf8; }
        .li-thumb { width: 52px; height: 52px; flex-shrink: 0; background: var(--faint); overflow: hidden; }
        .li-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .li-info { flex: 1; min-width: 0; }
        .li-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .li-sub   { font-size: 11px; color: var(--muted); }
        .li-badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; margin-left: 6px; }
        .li-badge.pub  { background: #edf7ed; color: var(--green); }
        .li-badge.priv { background: #fdecea; color: var(--red); }
        .li-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .list-empty { color: var(--muted); font-size: 13px; padding: 36px 0; text-align: center; }

        /* 문의 카드 */
        .contact-card { background: var(--white); border: 1px solid var(--faint); border-bottom: none; padding: 20px 24px; }
        .contact-card:last-child { border-bottom: 1px solid var(--faint); }
        .contact-card .cc-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .contact-card .cc-brand { font-size: 14px; font-weight: 700; }
        .contact-card .cc-date  { font-size: 11px; color: var(--muted); }
        .contact-card .cc-grid  { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px 20px; margin-bottom: 10px; }
        .contact-card .cc-field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; display: block; margin-bottom: 2px; }
        .contact-card .cc-field span  { font-size: 13px; }
        .contact-card .cc-msg { font-size: 13px; color: var(--mid); background: var(--bg); padding: 10px 14px; border-left: 2px solid var(--accent); line-height: 1.6; }

        /* 이미지 매니저 */
        .img-row { display: grid; grid-template-columns: 60px 1fr 120px; gap: 12px; align-items: center; background: var(--white); border: 1px solid var(--faint); border-bottom: none; padding: 12px 16px; }
        .img-row:last-child { border-bottom: 1px solid var(--faint); }
        .img-preview { width: 60px; height: 60px; background: var(--faint); overflow: hidden; flex-shrink: 0; }
        .img-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .img-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
        .img-url-input { width: 100%; padding: 7px 10px; border: 1px solid var(--faint); background: var(--bg); font-size: 12px; font-family: inherit; outline: none; }
        .img-url-input:focus { border-color: var(--ink); }
    </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
    <div style="text-align:center;">
        <h1>Design Walkers</h1>
        <p style="font-size:11px; color:var(--muted); margin-top:4px; letter-spacing:0.1em; text-transform:uppercase;">Admin Panel</p>
    </div>
    <div class="login-box">
        <input type="email" id="email-input" placeholder="관리자 이메일" autocomplete="username">
        <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter') tryLogin()">
        <button id="login-btn" onclick="tryLogin()">LOGIN</button>
        <p class="login-error" id="login-error"></p>
        <p style="font-size:11px;color:var(--muted);line-height:1.6;margin-top:16px;">허가된 관리자 계정만 접속할 수 있습니다.</p>
    </div>
</div>

<!-- 어드민 -->
<div id="admin-screen">
    <div class="admin-header">
        <h1>Design Walkers Admin</h1>
        <div style="display:flex;align-items:center;gap:16px;">
            <span id="admin-email" style="font-size:11px;color:rgba(255,255,255,0.65);"></span>
            <button onclick="logout()">LOGOUT</button>
        </div>
    </div>
    <div class="admin-body">

        <!-- 탭 네비 -->
        <nav class="admin-tabs">
            <div class="tab-group-label">콘텐츠</div>
            <button class="tab-btn active" data-tab="journal">Journal</button>
            <button class="tab-btn" data-tab="gallery">Gallery</button>
            <button class="tab-btn" data-tab="faq">FAQ</button>
            <button class="tab-btn" data-tab="contacts">문의 수신함</button>

            <div class="tab-group-label" style="margin-top:8px;">섹션 편집</div>
            <button class="tab-btn" data-tab="hero">Hero</button>
            <button class="tab-btn" data-tab="stories">Stories</button>
            <button class="tab-btn" data-tab="capabilities">WHAT WE MAKE</button>
            <button class="tab-btn" data-tab="process">Process</button>

            <div class="tab-group-label" style="margin-top:8px;">에셋</div>
            <button class="tab-btn" data-tab="images">이미지 URL</button>
        </nav>

        <div class="admin-content">

            <!-- ══════════ JOURNAL ══════════ -->
            <div class="panel active" id="tab-journal">
                <div class="panel-header">
                    <h2>Journal</h2>
                    <button class="btn btn-primary" onclick="showForm('journal-form', 'journal')">+ 새 게시물</button>
                </div>
                <div class="form-card" id="journal-form" style="display:none;">
                    <p class="form-card-title" id="journal-form-label">새 게시물</p>
                    <input type="hidden" id="jf-id">
                    <div class="field"><label>제목 *</label><input id="jf-title" placeholder="제목"></div>
                    <div class="field"><label>부제목</label><input id="jf-subtitle" placeholder="한 줄 요약"></div>
                    <div class="field"><label>커버 이미지 URL</label><input id="jf-cover" placeholder="https://..."></div>
                    <div class="field"><label>본문</label><textarea id="jf-content" rows="8" placeholder="본문 내용"></textarea></div>
                    <div class="field-row">
                        <div class="field"><label>순서</label><input id="jf-order" type="number" value="0"></div>
                        <div class="field"><label>공개 여부</label><div class="toggle-wrap"><button class="toggle on" id="jf-active" onclick="this.classList.toggle('on')"></button><span class="toggle-label">공개</span></div></div>
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-primary" onclick="saveJournal()">저장</button>
                        <button class="btn btn-ghost" onclick="hideForm('journal-form')">취소</button>
                        <span class="inline-msg" id="jf-msg"></span>
                    </div>
                </div>
                <div id="journal-list"></div>
            </div>

            <!-- ══════════ GALLERY ══════════ -->
            <div class="panel" id="tab-gallery">
                <div class="panel-header">
                    <h2>Gallery</h2>
                    <button class="btn btn-primary" onclick="showForm('gallery-form', 'gallery')">+ 새 작품</button>
                </div>
                <div class="form-card" id="gallery-form" style="display:none;">
                    <p class="form-card-title" id="gallery-form-label">새 작품</p>
                    <input type="hidden" id="gf-id">
                    <div class="field"><label>메인 이미지 URL *</label><input id="gf-url" placeholder="https://..."></div>
                    <div class="field-row">
                        <div class="field"><label>제품명</label><input id="gf-name" placeholder="Oversized Jacket"></div>
                        <div class="field"><label>부제 (카테고리·시즌)</label><input id="gf-sub" placeholder="Woven · SS 2025"></div>
                    </div>
                    <div class="field"><label>제품 설명</label><textarea id="gf-desc" rows="3" placeholder="제품 설명"></textarea></div>
                    <div class="field"><label>착용샷 URL (줄바꿈으로 구분)</label><textarea id="gf-shots" rows="4" placeholder="https://...&#10;https://..."></textarea></div>
                    <div class="field-row">
                        <div class="field"><label>순서</label><input id="gf-order" type="number" value="0"></div>
                        <div class="field"><label>공개 여부</label><div class="toggle-wrap"><button class="toggle on" id="gf-active" onclick="this.classList.toggle('on')"></button><span class="toggle-label">공개</span></div></div>
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-primary" onclick="saveGallery()">저장</button>
                        <button class="btn btn-ghost" onclick="hideForm('gallery-form')">취소</button>
                        <span class="inline-msg" id="gf-msg"></span>
                    </div>
                </div>
                <div id="gallery-list"></div>
            </div>

            <!-- ══════════ FAQ ══════════ -->
            <div class="panel" id="tab-faq">
                <div class="panel-header">
                    <h2>FAQ</h2>
                    <button class="btn btn-primary" onclick="showForm('faq-form', 'faq')">+ 새 질문</button>
                </div>
                <div class="form-card" id="faq-form" style="display:none;">
                    <p class="form-card-title" id="faq-form-label">새 질문</p>
                    <input type="hidden" id="ff-id">
                    <div class="field"><label>질문 *</label><input id="ff-q" placeholder="자주 묻는 질문"></div>
                    <div class="field"><label>답변 *</label><textarea id="ff-a" rows="4" placeholder="답변 내용"></textarea></div>
                    <div class="form-actions">
                        <button class="btn btn-primary" onclick="saveFaq()">저장</button>
                        <button class="btn btn-ghost" onclick="hideForm('faq-form')">취소</button>
                        <span class="inline-msg" id="ff-msg"></span>
                    </div>
                </div>
                <div id="faq-list"></div>
            </div>

            <!-- ══════════ 문의 수신함 ══════════ -->
            <div class="panel" id="tab-contacts">
                <div class="panel-header">
                    <h2>문의 수신함</h2>
                    <button class="btn btn-ghost" onclick="loadContacts()">↻ 새로고침</button>
                </div>
                <div id="contacts-list"></div>
            </div>

            <!-- ══════════ HERO ══════════ -->
            <div class="panel" id="tab-hero">
                <div class="panel-header"><h2>Hero 텍스트</h2></div>
                <div class="form-card">
                    <div class="field"><label>메인 타이틀</label><input id="hero-title" placeholder="타협 없는 실루엣."></div>
                    <div class="field"><label>서브 텍스트</label><textarea id="hero-desc" rows="3" placeholder="당신의 비전을..."></textarea></div>
                    <div class="form-actions">
                        <button class="btn btn-primary" onclick="saveTexts([['hero_title','hero-title'],['hero_desc','hero-desc']], 'hero-msg')">저장</button>
                        <span class="inline-msg" id="hero-msg"></span>
                    </div>
                </div>
            </div>

            <!-- ══════════ STORIES ══════════ -->
            <div class="panel" id="tab-stories">
                <div class="panel-header"><h2>Stories 섹션</h2></div>
                <div class="form-card">
                    <div class="field"><label>메인 제목</label><input id="stories-title" placeholder="디자인의 본질을 기술적으로 구현합니다."></div>
                    <div class="field"><label>본문 텍스트</label><textarea id="stories-body" rows="4" placeholder="감도 높은 브랜드들이..."></textarea></div>
                    <p class="form-card-title" style="margin-top:20px;">역량 박스</p>
                    <div class="field"><label>항목 1 제목</label><input id="stories-cap1-title" placeholder="Technical Pattern & Fit"></div>
                    <div class="field"><label>항목 1 설명</label><input id="stories-cap1-desc" placeholder="정밀 패턴 수정 및 핏 테스팅 역량"></div>
                    <div class="field"><label>항목 2 제목</label><input id="stories-cap2-title" placeholder="Woven & Knit Mastery"></div>
                    <div class="field"><label>항목 2 설명</label><input id="stories-cap2-desc" placeholder="원단 특성에 맞는 최적의 공정 설계"></div>
                    <div class="field"><label>항목 3 제목</label><input id="stories-cap3-title" placeholder="Rigorous QC"></div>
                    <div class="field"><label>항목 3 설명</label><input id="stories-cap3-desc" placeholder="전 공정 집요한 검수 프로세스"></div>
                    <div class="form-actions">
                        <button class="btn btn-primary" onclick="saveTexts([
                            ['stories_title','stories-title'],
                            ['stories_body','stories-body'],
                            ['stories_cap1_title','stories-cap1-title'],
                            ['stories_cap1_desc','stories-cap1-desc'],
                            ['stories_cap2_title','stories-cap2-title'],
                            ['stories_cap2_desc','stories-cap2-desc'],
                            ['stories_cap3_title','stories-cap3-title'],
                            ['stories_cap3_desc','stories-cap3-desc']
                        ], 'stories-msg')">저장</button>
                        <span class="inline-msg" id="stories-msg"></span>
                    </div>
                </div>
            </div>

            <!-- ══════════ CAPABILITIES ══════════ -->
            <div class="panel" id="tab-capabilities">
                <div class="panel-header"><h2>WHAT WE MAKE</h2></div>
                <div id="cap-cards-admin"></div>
                <div class="form-actions" style="margin-top:20px;">
                    <button class="btn btn-primary" onclick="saveCapabilities()">전체 저장</button>
                    <span class="inline-msg" id="cap-msg"></span>
                </div>
            </div>

            <!-- ══════════ PROCESS ══════════ -->
            <div class="panel" id="tab-process">
                <div class="panel-header"><h2>Process 단계</h2></div>
                <div id="process-cards-admin"></div>
                <div class="form-actions" style="margin-top:20px;">
                    <button class="btn btn-primary" onclick="saveProcess()">전체 저장</button>
                    <span class="inline-msg" id="process-msg"></span>
                </div>
            </div>

            <!-- ══════════ 이미지 URL ══════════ -->
            <div class="panel" id="tab-images">
                <div class="panel-header"><h2>이미지 URL 관리</h2></div>

                <!-- 이미지 URL -->
                <div class="form-card">
                    <p class="form-card-title">사이트 이미지 URL</p>
                    <div id="image-rows"></div>
                    <div class="form-actions" style="margin-top:16px;">
                        <button class="btn btn-primary" onclick="saveImages()">저장</button>
                        <span class="inline-msg" id="img-msg"></span>
                    </div>
                </div>
                    <p class="form-card-title">Hero 텍스트 박스 컬러</p>
                    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;">
                        <div onclick="selectHeroColor('#121212')" style="cursor:pointer;text-align:center;">
                            <div style="height:48px;background:#121212;border:2px solid transparent;border-radius:2px;" id="swatch-dark"></div>
                            <span style="font-size:10px;color:var(--muted);">블랙</span>
                        </div>
                        <div onclick="selectHeroColor('#ffffff')" style="cursor:pointer;text-align:center;">
                            <div style="height:48px;background:#ffffff;border:1px solid var(--faint);border-radius:2px;" id="swatch-white"></div>
                            <span style="font-size:10px;color:var(--muted);">화이트</span>
                        </div>
                        <div onclick="selectHeroColor('#f5f3f0')" style="cursor:pointer;text-align:center;">
                            <div style="height:48px;background:#f5f3f0;border:1px solid var(--faint);border-radius:2px;" id="swatch-off"></div>
                            <span style="font-size:10px;color:var(--muted);">오프화이트</span>
                        </div>
                        <div onclick="selectHeroColor('#f0f0f0')" style="cursor:pointer;text-align:center;">
                            <div style="height:48px;background:#f0f0f0;border:1px solid var(--faint);border-radius:2px;" id="swatch-gray"></div>
                            <span style="font-size:10px;color:var(--muted);">라이트그레이</span>
                        </div>

/* ── 인증 / 관리자 권한 ──

let currentAdminUser = null;

function showLoginError(message) {
    const el = document.getElementById('login-error');
    el.innerText = message || '';
    el.style.display = message ? 'block' : 'none';
}

function setLoginLoading(isLoading) {
    const btn = document.getElementById('login-btn');
    btn.disabled = isLoading;
    btn.innerText = isLoading ? 'CHECKING...' : 'LOGIN';
}

function showLoginScreen(message = '') {
    currentAdminUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('admin-email').innerText = '';
    document.getElementById('pw-input').value = '';
    showLoginError(message);
    setLoginLoading(false);
}

async function isRegisteredAdmin(userId) {
    const { data, error } = await sb
        .from('site_admin_users')
        .select('user_id')
        .eq('user_id', userId)
        .maybeSingle();
    if (error) {
        console.warn('관리자 권한 확인 실패:', error.message);
        return false;
    }
    return !!data;
}

async function enterAdmin(session) {
    if (!session || !session.user) {
        showLoginScreen();
        return;
    }
    const allowed = await isRegisteredAdmin(session.user.id);
    if (!allowed) {
        await sb.auth.signOut();
        showLoginScreen('관리자 권한이 등록되지 않은 계정입니다.');
        return;
    }
    currentAdminUser = session.user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    document.getElementById('admin-email').innerText = session.user.email || '';
    showLoginError('');
    await loadAll();
}

async function tryLogin() {
    const email = document.getElementById('email-input').value.trim();
    const password = document.getElementById('pw-input').value;
    if (!email || !password) {
        showLoginError('이메일과 비밀번호를 입력해주세요.');
        return;
    }

    setLoginLoading(true);
    showLoginError('');

    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error || !data.session) {
        showLoginError('로그인 정보가 올바르지 않습니다.');
        setLoginLoading(false);
        return;
    }

    await enterAdmin(data.session);
    setLoginLoading(false);
}

    await sb.auth.signOut();
    showLoginScreen();

async function loadTexts() {

    setVal('hero-box-color', boxColor);
    setVal('hero-box-color-picker', boxColor);
    // 이미지 URL — siteTexts 로드 후 렌더
    loadImages();
}

function setVal(id, val) { const el = document.getElementById(id); if (el && val) el.value = val; }

async function saveTexts(pairs, msgId) {
    let err = false;
    for (const [key, inputId] of pairs) {
        const el = document.getElementById(inputId);
        if (!el) continue;
        const value = el.value.trim();

        // 기존 행 조회
        const { data: existing } = await sb
            .from('site_texts').select('id').eq('key', key);

        let error;
        if (existing && existing.length > 1) {
            // 중복 행 있으면 전부 삭제 후 새로 insert
            await sb.from('site_texts').delete().eq('key', key);
            ({ error } = await sb.from('site_texts').insert([{ key, value }]));
        } else if (existing && existing.length === 1) {
            ({ error } = await sb.from('site_texts').update({ value }).eq('key', key));
        } else {
            ({ error } = await sb.from('site_texts').insert([{ key, value }]));
        }
        if (error) err = true;
        else siteTexts[key] = value;
    }
    inlineMsg(msgId, err ? '일부 항목 저장 실패' : '저장되었습니다.', err ? 'err' : 'ok');
}

    el.innerHTML = IMAGE_KEYS.filter(img => !img.hidden).map(img => `
        <div style="background:var(--white);border:1px solid var(--faint);padding:20px;margin-bottom:12px;">
            <p class="form-card-title" style="margin-bottom:16px;">${img.label}</p>
            <div style="display:grid;grid-template-columns:80px 1fr;gap:16px;align-items:start;">
                <div class="img-preview" id="prev-${img.key}" style="width:80px;height:80px;">
                    ${siteTexts[img.key] ? `<img src="${siteTexts[img.key]}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;">` : ''}
                </div>
                <div>
                    <div class="field" style="margin-bottom:12px;">
                        <label>이미지 URL</label>
                        <input class="img-url-input" id="${img.key}"
                            value="${siteTexts[img.key]||''}"
                            placeholder="https://..."
                            oninput="updatePreview('${img.key}')"
                            style="width:100%;padding:8px 10px;border:1px solid var(--faint);background:var(--bg);font-size:12px;font-family:inherit;outline:none;">
                    </div>
                    ${img.hasPosition ? `
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div class="field">
                            <label>높이 (vh)</label>
                            <select id="${img.key}_height" style="width:100%;padding:8px 10px;border:1px solid var(--faint);background:var(--bg);font-size:12px;font-family:inherit;outline:none;">
                                <option value="50vh" ${siteTexts[img.key+'_height']==='50vh'?'selected':''}>50vh — 낮게</option>
                                <option value="60vh" ${siteTexts[img.key+'_height']==='60vh'?'selected':''}>60vh</option>
                                <option value="70vh" ${(!siteTexts[img.key+'_height']||siteTexts[img.key+'_height']==='70vh')?'selected':''}>70vh — 기본</option>
                                <option value="80vh" ${siteTexts[img.key+'_height']==='80vh'?'selected':''}>80vh</option>
                                <option value="90vh" ${siteTexts[img.key+'_height']==='90vh'?'selected':''}>90vh — 크게</option>
                                <option value="100vh" ${siteTexts[img.key+'_height']==='100vh'?'selected':''}>100vh — 전체</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>구도 (세로 기준)</label>
                            <select id="${img.key}_pos" style="width:100%;padding:8px 10px;border:1px solid var(--faint);background:var(--bg);font-size:12px;font-family:inherit;outline:none;">
                                <option value="top"    ${siteTexts[img.key+'_pos']==='top'?'selected':''}>상단 기준 (얼굴·상체)</option>
                                <option value="center" ${(!siteTexts[img.key+'_pos']||siteTexts[img.key+'_pos']==='center')?'selected':''}>중앙 기준 — 기본</option>
                                <option value="bottom" ${siteTexts[img.key+'_pos']==='bottom'?'selected':''}>하단 기준 (하체·발)</option>
                                <option value="20% center" ${siteTexts[img.key+'_pos']==='20% center'?'selected':''}>약간 위</option>
                                <option value="30% center" ${siteTexts[img.key+'_pos']==='30% center'?'selected':''}>위에서 30%</option>
                                <option value="40% center" ${siteTexts[img.key+'_pos']==='40% center'?'selected':''}>위에서 40%</option>
                            </select>
                        </div>
                    </div>
                    ` : ''}
                </div>
            </div>
        </div>`).join('');
}

function updatePreview(key) {
    const url  = document.getElementById(key).value;
    const prev = document.getElementById('prev-'+key);
    prev.innerHTML = url ? `<img src="${url}" onerror="this.innerHTML=''" style="width:100%;height:100%;object-fit:cover;">` : '';
}

async function saveImages() {
    const pairs = [];
    IMAGE_KEYS.filter(img => !img.hidden).forEach(img => {
        pairs.push([img.key, img.key]);
        if (img.hasPosition) {
            pairs.push([img.key+'_height', img.key+'_height']);
            pairs.push([img.key+'_pos',    img.key+'_pos']);
        }
    });
    // img_hero 변경 시 hero_image_url도 동기화
    const heroInput = document.getElementById('img_hero');
    if (heroInput) {
        pairs.push(['hero_image_url', 'img_hero']);
    }
    await saveTexts(pairs, 'img-msg');
    const { data } = await sb.from('site_texts').select('*');
    if (data) data.forEach(d => { siteTexts[d.key] = d.value; });
    loadImages();
}

/* ═══════════════════════════════
   Hero 박스 컬러
═══════════════════════════════ */
function selectHeroColor(color) {
    document.getElementById('hero-box-color').value = color;
    document.getElementById('hero-box-color-picker').value = color;
}

async function saveHeroBoxColor() {
    const color = document.getElementById('hero-box-color').value.trim() || '#f5f3f0';
    await saveTexts([['hero_box_color', 'hero-box-color']], 'hero-color-msg');
}

/* ═══════════════════════════════
   공통 삭제
═══════════════════════════════ */
async function deleteRow(table, id, reloadFn) {
    if (!confirm('삭제하시겠습니까?')) return;
    await sb.from(table).delete().eq('id', id);
    reloadFn();
}
</script>
